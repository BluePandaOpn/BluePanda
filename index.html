<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BluePanda Studios | Elite Game Development & Digital Arts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">
    <div id="cursor"></div>

    <header id="nav-header">
        <div class="logo" data-go="inicio">
            <img src="https://raw.githubusercontent.com/BluePandaOpn/InkSiege-Docs/main/assets/logos.png" alt="BP">
            <span>BLUEPANDA <span class="logo-soft">STUDIOS</span></span>
        </div>

        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <i data-lucide="menu"></i>
        </button>

        <nav id="main-nav">
            <a href="#inicio" class="nav-link active" data-view="inicio">Sistemas</a>
            <a href="#juegos" class="nav-link" data-view="juegos">Producciones</a>
            <a href="#estudio" class="nav-link" data-view="estudio">Arquitectura</a>
            <a href="#contacto" class="nav-link" data-view="contacto">Nexo</a>
        </nav>

        <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">
            <i data-lucide="sun" id="theme-ico"></i>
        </button>
    </header>

    <main id="app-content" aria-live="polite"></main>

    <footer>
        <div class="footer-wrap">
            <div>
                <h4>BLUEPANDA</h4>
                <p>Forjando el futuro del entretenimiento interactivo desde las sombras del codigo fuente.</p>
            </div>
            <div class="footer-right">
                <div class="footer-icons">
                    <i data-lucide="github"></i>
                    <i data-lucide="linkedin"></i>
                    <i data-lucide="twitter"></i>
                </div>
                <p>&copy; 2026 BLUEPANDA STUDIOS. ALL RELEVANT DATA PROTECTED.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>

</html>
